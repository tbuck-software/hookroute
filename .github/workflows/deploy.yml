name: Deploy to production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or commit to deploy
        required: true
        default: main
        type: string

concurrency:
  group: hookroute-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy hook.tbuck.de
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment:
      name: production
      url: https://hook.tbuck.de

    steps:
      - name: Check out deployment ref
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}

      - name: Resolve deployment commit
        run: echo "DEPLOY_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Set up PHP
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: '8.4'
          extensions: curl, mbstring, openssl, pdo_mysql, tokenizer, xml, zip
          coverage: none

      - name: Install production PHP dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22.12.0'
          cache: npm

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      - name: Install production configuration
        env:
          PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}
        run: |
          test -n "$PRODUCTION_ENV"
          printf '%s\n' "$PRODUCTION_ENV" > .env
          php <<'PHP'
          <?php
          require __DIR__.'/vendor/autoload.php';

          $values = Dotenv\Dotenv::createArrayBacked(__DIR__)->load();
          $required = [
              'APP_KEY',
              'DB_CONNECTION',
              'DB_HOST',
              'DB_PORT',
              'DB_DATABASE',
              'DB_USERNAME',
              'DB_PASSWORD',
          ];

          foreach ($required as $key) {
              if (($values[$key] ?? '') === '') {
                  throw new RuntimeException("Missing required production setting: {$key}");
              }
          }

          if (($values['APP_ENV'] ?? '') !== 'production') {
              throw new RuntimeException('APP_ENV must be production.');
          }

          if (($values['APP_DEBUG'] ?? '') !== 'false') {
              throw new RuntimeException('APP_DEBUG must be false.');
          }

          if (($values['APP_URL'] ?? '') !== 'https://hook.tbuck.de') {
              throw new RuntimeException('APP_URL must be https://hook.tbuck.de.');
          }
          PHP

      - name: Prepare production release
        run: |
          mkdir -p "$RUNNER_TEMP/hookroute"
          rsync -a --delete \
            --exclude='.ai/' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='tests/' \
            --exclude='compose.yaml' \
            --exclude='phpunit.xml' \
            --exclude='scripts/' \
            --exclude='README.md' \
            --exclude='CHANGELOG.md' \
            --exclude='.env*' \
            --exclude='database/database.sqlite' \
            ./ "$RUNNER_TEMP/hookroute/"

      - name: Deploy signed ZIP release
        uses: tbuck-software/ftps-zip-deploy@d3ad051ee732f04315c8f4c5d40dad9827358098
        with:
          source-directory: ${{ runner.temp }}/hookroute
          ftp-server: ${{ secrets.FTP_SERVER }}
          ftp-username: ${{ secrets.FTP_USERNAME }}
          ftp-password: ${{ secrets.FTP_PASSWORD }}
          server-directory: /
          application-url: https://hook.tbuck.de
          deployment-secret: ${{ secrets.FTPS_ZIP_DEPLOY_SECRET }}
          environment-file: .env
          post-deploy-hook: deploy/post-release.php
          health-url: https://hook.tbuck.de/up
          release-id: ${{ env.DEPLOY_SHA }}-${{ github.run_id }}-${{ github.run_attempt }}
          deployment-commit: ${{ env.DEPLOY_SHA }}
